<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>AI 지능형 경로 추천 서비스</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; }
        #map { width: 100%; height: 500px; margin-top: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .control-panel { padding: 20px; background-color: #f8f9fa; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .input-group { margin: 15px 0; }
        input[type="text"] { width: 60%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .btn-reset { background-color: #6c757d; }
        .btn-reset:hover { background-color: #5a6268; }
        #statusMsg { font-weight: bold; color: #d9534f; margin-top: 10px; }
        .ai-intent { display: inline-block; padding: 5px 10px; border-radius: 15px; font-size: 13px; color: white; display: none; margin-left: 10px; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>🤖 AI 경로 추천 서비스</h2>
    <p>1. 지도 위를 클릭하여 <b>출발지(🔴)</b>와 <b>목적지(🔵)</b>를 차례대로 설정하세요.</p>
    
    <div class="input-group">
        <label for="userInput">2. AI에게 원하는 경로를 말해주세요: </label><br>
        <input type="text" id="userInput" placeholder="예: 밤길이 무서워서 밝고 안전하게 가고 싶어">
        <span id="intentBadge" class="ai-intent"></span>
    </div>
    
    <button onclick="requestRoute()">경로 추천받기</button>
    <button class="btn-reset" onclick="resetMap()">지도 초기화</button>
    
    <p id="statusMsg">상태: 출발지를 지도에 클릭해주세요.</p>
</div>

<div id="map"></div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_key }}"></script>

<script>
    // 1. 지도 초기화
    var mapContainer = document.getElementById('map');
    var mapOption = { 
        center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 중심좌표 (서울시청)
        level: 5 // 확대 레벨
    };
    var map = new kakao.maps.Map(mapContainer, mapOption);

    // 상태 저장 변수
    var markers = [];
    var startCoord = null;
    var endCoord = null;
    var polyline = null;

    // 2. 지도 클릭 이벤트 (마커 찍기)
    kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
        if (markers.length >= 2) return;

        var latlng = mouseEvent.latLng;
        
        // 출발지와 목적지 마커 이미지(색상) 다르게 설정
        var imageSrc = markers.length === 0 ? 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png' : 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png'; 
        var markerImage = new kakao.maps.MarkerImage(imageSrc, new kakao.maps.Size(24, 35));

        var marker = new kakao.maps.Marker({
            position: latlng,
            map: map,
            image: markerImage
        });
        
        markers.push(marker);

        if (markers.length === 1) {
            startCoord = latlng;
            document.getElementById('statusMsg').innerText = "상태: 출발지가 설정되었습니다. 목적지를 클릭해주세요.";
        } else if (markers.length === 2) {
            endCoord = latlng;
            document.getElementById('statusMsg').innerText = "상태: 목적지가 설정되었습니다. AI에게 요청할 문장을 적고 버튼을 누르세요.";
        }
    });

    // 3. 백엔드(FastAPI)로 경로 탐색 요청
    async function requestRoute() {
        if (!startCoord || !endCoord) {
            alert("출발지와 목적지를 모두 설정해주세요!");
            return;
        }

        var userMessage = document.getElementById('userInput').value;
        if (!userMessage.trim()) {
            alert("경로에 대한 요구사항을 입력해주세요!");
            return;
        }

        document.getElementById('statusMsg').innerText = "상태: AI가 문장을 분석하고 최적의 경로를 탐색 중입니다...";
        document.getElementById('statusMsg').style.color = "#007bff";

        // 서버로 보낼 데이터
        var requestData = {
            start_lat: startCoord.getLat(),
            start_lng: startCoord.getLng(),
            end_lat: endCoord.getLat(),
            end_lng: endCoord.getLng(),
            user_message: userMessage
        };

        try {
            // FastAPI 서버 호출
            const response = await fetch('http://127.0.0.1:8000/api/get_route', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            if (!response.ok) throw new Error("서버 통신 실패");

            const result = await response.json();

            if (result.status === "success" && result.path.length > 0) {
                drawPolyline(result.path, result.intent);
                updateUI(result.intent);
            } else {
                alert("경로를 찾을 수 없습니다. 좌표가 너무 멀거나 바다 위일 수 있습니다.");
                document.getElementById('statusMsg').innerText = "상태: 경로 탐색 실패";
            }

        } catch (error) {
            console.error("에러 발생:", error);
            document.getElementById('statusMsg').innerText = "상태: 서버 통신 에러! FastAPI 서버가 켜져 있는지 확인하세요.";
            document.getElementById('statusMsg').style.color = "#d9534f";
        }
    }

    // 4. 지도에 실제 도로망 선(Polyline) 그리기
    function drawPolyline(pathCoords, intent) {
        if (polyline) { polyline.setMap(null); }

        // 백엔드에서 온 배열을 카카오맵 LatLng 객체로 변환
        var linePath = pathCoords.map(coord => new kakao.maps.LatLng(coord.lat, coord.lng));

        // AI 의도에 따라 선 색상 다르게 표시
        var strokeColor = '#FF0000'; // shortest (빨강)
        if (intent === 'safe') strokeColor = '#0000FF'; // safe (파랑)
        else if (intent === 'scenic') strokeColor = '#00FF00'; // scenic (초록)

        polyline = new kakao.maps.Polyline({
            path: linePath,
            strokeWeight: 6,
            strokeColor: strokeColor,
            strokeOpacity: 0.8,
            strokeStyle: 'solid'
        });

        polyline.setMap(map);
    }

    // 5. AI 분석 결과 UI 업데이트
    function updateUI(intent) {
        var msg = "최단 거리 모드";
        var bgColor = "#dc3545"; // 빨강
        
        if (intent === 'safe') {
            msg = "안전 최우선 모드";
            bgColor = "#007bff"; // 파랑
        } else if (intent === 'scenic') {
            msg = "풍경/산책 모드";
            bgColor = "#28a745"; // 초록
        }

        var badge = document.getElementById('intentBadge');
        badge.innerText = "AI 판단: " + msg;
        badge.style.backgroundColor = bgColor;
        badge.style.display = "inline-block";

        document.getElementById('statusMsg').innerText = "상태: 안내 경로가 지도에 표시되었습니다!";
        document.getElementById('statusMsg').style.color = "#28a745";
    }

    // 6. 초기화
    function resetMap() {
        for (var i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        if (polyline) { polyline.setMap(null); }
        markers = [];
        startCoord = null;
        endCoord = null;
        
        document.getElementById('userInput').value = "";
        document.getElementById('intentBadge').style.display = "none";
        document.getElementById('statusMsg').innerText = "상태: 지도를 초기화했습니다. 출발지를 다시 클릭해주세요.";
        document.getElementById('statusMsg').style.color = "#d9534f";
    }
</script>

</body>
</html>
